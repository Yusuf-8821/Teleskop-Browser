<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Electron Tarayıcı</title>
  <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      display: flex; 
      flex-direction: column; 
      font-family: Arial, sans-serif; 
    }
    #toolbar { 
      display: flex; 
      padding: 10px; 
      background: #e2e2e2; 
      border-bottom: 1px solid #ccc; 
      gap: 5px;
    }
    #toolbar button { 
      padding: 5px 15px; 
      cursor: pointer; 
    }
    #url-bar { 
      flex-grow: 1; 
      padding: 5px 10px; 
      font-size: 14px; 
    }
    /* webview'in tüm boş alanı kaplamasını sağlıyoruz */
    webview { 
      flex-grow: 1; 
      display: flex; 
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <button id="btn-back">Geri</button>
    <button id="btn-forward">İleri</button>
    <button id="btn-reload">Yenile</button>
    <input type="text" id="url-bar" value="https://www.google.com" />
    <button id="btn-go">Git</button>
  </div>

  <webview id="browser-view" src="https://www.google.com" allowpopups></webview>

  <script>
    // Elementleri seçiyoruz
    const webview = document.getElementById('browser-view');
    const urlBar = document.getElementById('url-bar');
    const btnBack = document.getElementById('btn-back');
    const btnForward = document.getElementById('btn-forward');
    const btnReload = document.getElementById('btn-reload');
    const btnGo = document.getElementById('btn-go');

    // URL yükleme fonksiyonu
    function loadUrl() {
      let url = urlBar.value.trim();
      // Eğer kullanıcı http veya https yazmadıysa otomatik ekle
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      webview.loadURL(url);
    }

    // Buton tetikleyicileri
    btnGo.addEventListener('click', loadUrl);
    
    urlBar.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadUrl();
    });

    btnBack.addEventListener('click', () => {
      if (webview.canGoBack()) webview.goBack();
    });

    btnForward.addEventListener('click', () => {
      if (webview.canGoForward()) webview.goForward();
    });

    btnReload.addEventListener('click', () => {
      webview.reload();
    });

    // Kullanıcı bir linke tıkladığında adres çubuğunu yeni URL ile güncelle
    webview.addEventListener('did-navigate', (e) => {
      urlBar.value = e.url;
    });

    webview.addEventListener('did-navigate-in-page', (e) => {
      urlBar.value = e.url;
    });
  </script>
</body>
</html>
